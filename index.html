<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Time to Fight</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0c1018; font-family:-apple-system,"Segoe UI",system-ui,sans-serif; touch-action:none; }
  #wrap { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; }

  /* HUD */
  #hud { position:fixed; inset:0; pointer-events:none; z-index:10; }
  #topbar { position:absolute; top:12px; left:0; right:0; display:flex; justify-content:space-between; padding:0 16px; color:#dfe8ff; }
  .hpblock { width:42%; }
  .hplabel { font-size:12px; font-weight:700; text-shadow:0 1px 3px #000; margin-bottom:3px; }
  .hpbar { height:16px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); border-radius:8px; overflow:hidden; }
  .hpfill { height:100%; transition:width .12s; }
  #pHp .hpfill { background:linear-gradient(90deg,#2ecc71,#27ae60); }
  #eHp { text-align:right; }
  #eHp .hpfill { background:linear-gradient(90deg,#ff5b5b,#c0341a); margin-left:auto; }

  #banner { position:fixed; left:50%; top:24%; transform:translateX(-50%); z-index:12; text-align:center; color:#fff; pointer-events:none; }
  #banner h1 { font-size:clamp(28px,8vw,58px); font-weight:800; letter-spacing:2px; text-shadow:0 2px 14px #000,0 0 22px #6cf; }
  #banner p { margin-top:8px; font-size:clamp(13px,3.6vw,18px); color:#bcd; text-shadow:0 1px 6px #000; }

  /* joystick (left) */
  #stick { position:fixed; left:24px; bottom:34px; width:150px; height:150px; z-index:11; pointer-events:auto; }
  #stickBase { position:absolute; inset:0; border-radius:50%; background:rgba(255,255,255,.07); border:2px solid rgba(255,255,255,.2); }
  #stickKnob { position:absolute; left:50%; top:50%; width:62px; height:62px; margin:-31px 0 0 -31px; border-radius:50%; background:rgba(140,180,255,.55); border:2px solid rgba(220,235,255,.6); }
  #stickLabel { position:absolute; left:50%; bottom:-20px; transform:translateX(-50%); color:#9ab; font-size:11px; white-space:nowrap; }

  /* hand / grab button (right) */
  .btn { position:fixed; z-index:11; pointer-events:auto; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; text-shadow:0 1px 3px #000; border:2px solid rgba(255,255,255,.25); flex-direction:column; }
  .btn:active { filter:brightness(1.3); transform:scale(.94); }
  #hand { right:30px; bottom:44px; width:104px; height:104px; background:radial-gradient(circle at 35% 30%,#ffd36c,#c98a1a); font-size:15px; }
  #hand.gripping { box-shadow:0 0 20px #ffd36c, 0 0 4px #fff inset; border-color:#fff0c0; }
  #jump { right:150px; bottom:60px; width:70px; height:70px; background:radial-gradient(circle at 35% 30%,#4fd1ff,#1f6fb0); font-size:13px; }

  #startBtn { position:fixed; left:50%; top:54%; transform:translate(-50%,-50%); z-index:13; pointer-events:auto;
    padding:16px 34px; border-radius:14px; font-size:20px; font-weight:800; color:#06121f;
    background:linear-gradient(90deg,#6cf,#9be15d); border:none; box-shadow:0 6px 22px rgba(108,204,255,.5); }
  .hidden { display:none !important; }

  #hint { position:fixed; left:50%; bottom:6px; transform:translateX(-50%); color:#567; font-size:11px; z-index:9; pointer-events:none; text-align:center; }
</style>
</head>
<body>
<div id="wrap"></div>

<div id="hud">
  <div id="topbar">
    <div class="hpblock" id="pHp"><div class="hplabel">YOU</div><div class="hpbar"><div class="hpfill" style="width:100%"></div></div></div>
    <div class="hpblock" id="eHp"><div class="hplabel">ENEMY</div><div class="hpbar"><div class="hpfill" style="width:100%"></div></div></div>
  </div>
</div>

<div id="banner"><h1 id="bTitle">TIME TO FIGHT</h1><p id="bText">Stickman physics brawl</p></div>
<button id="startBtn">START</button>

<div id="stick">
  <div id="stickBase"></div>
  <div id="stickKnob"></div>
  <div id="stickLabel">MOVE = ATTACK</div>
</div>

<button class="btn" id="jump">JUMP</button>
<button class="btn" id="hand">HAND<br>GRAB</button>
<div id="hint">Move the joystick to swing your weapon · touch a wall + HAND to grab</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const { Engine, Render, Runner, World, Bodies, Body, Composite, Constraint, Events, Vector } = Matter;

// ---------- engine ----------
const engine = Engine.create();
engine.world.gravity.y = 1.4;
const world = engine.world;

const wrap = document.getElementById('wrap');
let W = innerWidth, H = innerHeight;

const render = Render.create({
  element: wrap,
  engine: engine,
  options: { width: W, height: H, wireframes:false, background:'#0c1018', pixelRatio: Math.min(window.devicePixelRatio,2) }
});
Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// ---------- collision categories ----------
const CAT = { GROUND:0x0001, PLAYER:0x0002, ENEMY:0x0004, WEAPON_P:0x0008, WEAPON_E:0x0010, PROP:0x0020 };

// ---------- arena ----------
const groundY = H - 60;
const ground = Bodies.rectangle(W/2, groundY+30, W*3, 60, { isStatic:true, label:'ground',
  collisionFilter:{ category:CAT.GROUND }, render:{ fillStyle:'#1b2336' } });
const leftWall  = Bodies.rectangle(40, H/2, 80, H*2, { isStatic:true, label:'wall',
  collisionFilter:{ category:CAT.GROUND }, render:{ fillStyle:'#222d44' } });
const rightWall = Bodies.rectangle(W-40, H/2, 80, H*2, { isStatic:true, label:'wall',
  collisionFilter:{ category:CAT.GROUND }, render:{ fillStyle:'#222d44' } });
World.add(world, [ground, leftWall, rightWall]);

// decorative ground stripe handled by render

// ---------- stickman factory ----------
// A simple ragdoll: torso + head + 2 legs + weapon arm (the "swing" hand) + grab hand
function makeStickman(x, y, opts){
  opts = opts || {};
  const scale = opts.scale || 1;
  const isPlayer = !!opts.isPlayer;
  const cat = isPlayer ? CAT.PLAYER : CAT.ENEMY;
  const wcat = isPlayer ? CAT.WEAPON_P : CAT.WEAPON_E;
  const color = opts.color || (isPlayer ? '#7fd4ff' : '#ff8a8a');
  const group = Body.nextGroup(true); // parts of same ragdoll don't collide each other

  const cf = { group, category:cat, mask: CAT.GROUND|CAT.PLAYER|CAT.ENEMY|CAT.PROP };

  const torso = Bodies.rectangle(x, y, 16*scale, 46*scale, {
    collisionFilter:cf, label:(isPlayer?'p':'e')+'_torso',
    render:{ fillStyle:color }, density:0.0016, friction:0.6 });
  const head = Bodies.circle(x, y-38*scale, 13*scale, {
    collisionFilter:cf, label:(isPlayer?'p':'e')+'_head',
    render:{ fillStyle:color }, density:0.0012 });
  const legL = Bodies.rectangle(x-5*scale, y+40*scale, 8*scale, 40*scale, {
    collisionFilter:cf, render:{ fillStyle:color }, density:0.0012, friction:0.9 });
  const legR = Bodies.rectangle(x+5*scale, y+40*scale, 8*scale, 40*scale, {
    collisionFilter:cf, render:{ fillStyle:color }, density:0.0012, friction:0.9 });

  // weapon (a bat): attached to a swing arm pivot near shoulder
  const wlen = (opts.weaponLen||54)*scale;
  const weapon = Bodies.rectangle(x+22*scale, y-18*scale, wlen, 9*scale, {
    collisionFilter:{ group, category:wcat, mask: CAT.PLAYER|CAT.ENEMY|CAT.PROP },
    label:(isPlayer?'p':'e')+'_weapon', render:{ fillStyle: opts.weaponColor||'#d9a066' },
    density:0.0010, friction:0.3, frictionAir:0.02 });

  // grab hand (small circle) — used to stick to walls
  const hand = Bodies.circle(x-16*scale, y-14*scale, 7*scale, {
    collisionFilter:{ group, category:cat, mask: CAT.GROUND }, label:(isPlayer?'p':'e')+'_hand',
    render:{ fillStyle:'#ffe08a' }, density:0.0008 });

  const parts = [torso, head, legL, legR, weapon, hand];

  // joints
  const cons = [];
  const stiff = 0.9;
  cons.push(Constraint.create({ bodyA:torso, pointA:{x:0,y:-23*scale}, bodyB:head, pointB:{x:0,y:11*scale}, stiffness:stiff, length:2, render:{visible:false} }));
  cons.push(Constraint.create({ bodyA:torso, pointA:{x:-5*scale,y:22*scale}, bodyB:legL, pointB:{x:0,y:-18*scale}, stiffness:0.8, length:2, render:{visible:false} }));
  cons.push(Constraint.create({ bodyA:torso, pointA:{x:5*scale,y:22*scale}, bodyB:legR, pointB:{x:0,y:-18*scale}, stiffness:0.8, length:2, render:{visible:false} }));
  // weapon shoulder pivot
  const shoulder = { x:8*scale, y:-18*scale };
  cons.push(Constraint.create({ bodyA:torso, pointA:shoulder, bodyB:weapon, pointB:{x:-wlen/2+4,y:0}, stiffness:0.7, length:6, render:{visible:false} }));
  // grab hand to shoulder area
  cons.push(Constraint.create({ bodyA:torso, pointA:{x:-8*scale,y:-14*scale}, bodyB:hand, pointB:{x:0,y:0}, stiffness:0.5, length:10, render:{visible:false} }));

  World.add(world, parts);
  World.add(world, cons);

  return {
    parts, cons, torso, head, weapon, hand, legL, legR, scale, isPlayer, color,
    hp: opts.hp||100, maxHp: opts.hp||100,
    swingPhase: Math.random()*Math.PI*2,
    grabConstraint: null,
    facing: isPlayer ? 1 : -1,
    hitCd: 0,
  };
}

// ---------- game state ----------
let mode = 'lobby'; // lobby | fight | win | lose
let player=null, enemy=null;
const moveInput = { x:0, y:0, active:false };

function startFight(){
  // clear any previous
  if(player) removeStickman(player);
  if(enemy) removeStickman(enemy);
  player = makeStickman(W*0.35, groundY-90, { isPlayer:true, hp:100, color:'#7fd4ff', weaponColor:'#cfe6ff' });
  enemy  = makeStickman(W*0.65, groundY-90, { isPlayer:false, hp:100, color:'#ff8a8a', weaponColor:'#ffd0a0' });
  mode='fight';
  setHp(); 
  banner('LEVEL 1', 'Bat vs Bat — fight!', 1600);
}

function removeStickman(s){
  Composite.remove(world, s.cons);
  for(const p of s.parts) World.remove(world, p);
  if(s.grabConstraint) World.remove(world, s.grabConstraint);
}

// ---------- HP ----------
function setHp(){
  document.querySelector('#pHp .hpfill').style.width = Math.max(0, player.hp/player.maxHp*100)+'%';
  document.querySelector('#eHp .hpfill').style.width = Math.max(0, enemy.hp/enemy.maxHp*100)+'%';
}
function damage(target, dmg){
  if(mode!=='fight') return;
  target.hitCd = 0.25;
  target.hp -= dmg;
  if(target.hp<=0){ target.hp=0; setHp(); endFight(target===enemy); return; }
  setHp();
}
function endFight(playerWon){
  mode = playerWon ? 'win' : 'lose';
  banner(playerWon?'YOU WIN!':'YOU LOSE', playerWon?'Tap to play again':'Tap to try again', 99999);
  startBtn.textContent = playerWon?'NEXT':'RETRY';
  startBtn.classList.remove('hidden');
  startBtn.onclick = ()=>{ startBtn.classList.add('hidden'); startFight(); };
}

// ---------- banner ----------
const bannerEl=document.getElementById('banner'), bTitle=document.getElementById('bTitle'), bText=document.getElementById('bText');
let bannerTimer=0;
function banner(t, sub, ms){ bTitle.textContent=t; bText.textContent=sub||''; bannerEl.classList.remove('hidden'); bannerEl.style.opacity=1; bannerTimer=ms/1000; }

// ---------- start button ----------
const startBtn=document.getElementById('startBtn');
startBtn.onclick = ()=>{ startBtn.classList.add('hidden'); startFight(); };

// ---------- joystick ----------
const stick=document.getElementById('stick'), knob=document.getElementById('stickKnob');
let stickId=null, stickOrigin={x:0,y:0};
const SMAX=70;
function isUI(t){ return t.closest && (t.closest('.btn')||t.closest('#startBtn')); }
addEventListener('touchstart', e=>{
  for(const t of e.changedTouches){
    if(isUI(t.target)) continue;
    if(stickId===null && t.clientX < innerWidth*0.55){ stickId=t.identifier; stickOrigin={x:t.clientX,y:t.clientY}; updateStick(t); }
  }
}, {passive:false});
addEventListener('touchmove', e=>{
  for(const t of e.changedTouches){ if(t.identifier===stickId){ updateStick(t); e.preventDefault(); } }
}, {passive:false});
addEventListener('touchend', e=>{
  for(const t of e.changedTouches){ if(t.identifier===stickId){ stickId=null; moveInput.x=0; moveInput.y=0; moveInput.active=false; knob.style.transform='translate(0,0)'; } }
}, {passive:false});
function updateStick(t){
  let dx=t.clientX-stickOrigin.x, dy=t.clientY-stickOrigin.y;
  const len=Math.hypot(dx,dy); if(len>SMAX){ dx*=SMAX/len; dy*=SMAX/len; }
  knob.style.transform=`translate(${dx}px,${dy}px)`;
  moveInput.x=dx/SMAX; moveInput.y=dy/SMAX; moveInput.active = Math.hypot(moveInput.x,moveInput.y) > 0.15;
}
// keyboard
const keys={};
addEventListener('keydown', e=>{ keys[e.code]=true;
  if(e.code==='Space') doJump();
  if(e.code==='KeyJ'||e.code==='KeyH') toggleGrab();
});
addEventListener('keyup', e=>{ keys[e.code]=false; });

// ---------- buttons ----------
function bindBtn(id, fn){
  const el=document.getElementById(id);
  const d=e=>{ e.preventDefault(); e.stopPropagation(); fn(); };
  el.addEventListener('touchstart', d, {passive:false});
  el.addEventListener('mousedown', d);
}
bindBtn('jump', doJump);
bindBtn('hand', toggleGrab);

function doJump(){
  if(mode!=='fight'||!player) return;
  // only jump when feet near ground or gripping
  const feetY = Math.max(player.legL.position.y, player.legR.position.y);
  if(feetY > groundY-20 || player.grabConstraint){
    if(player.grabConstraint){ releaseGrab(player); }
    Body.applyForce(player.torso, player.torso.position, { x: player.facing*0.012, y:-0.09 });
  }
}

function toggleGrab(){
  if(mode!=='fight'||!player) return;
  if(player.grabConstraint){ releaseGrab(player); }
  else { tryGrab(player); }
}
function tryGrab(s){
  // grab if hand is near a wall
  const hx = s.hand.position.x;
  const nearLeft = hx < 100;
  const nearRight = hx > W-100;
  if(nearLeft || nearRight){
    const anchor = { x: nearLeft? 80 : W-80, y: s.hand.position.y };
    s.grabConstraint = Constraint.create({
      pointA: anchor, bodyB: s.hand, pointB:{x:0,y:0},
      stiffness:0.9, length:4, render:{ strokeStyle:'#ffe08a', lineWidth:2 }
    });
    World.add(world, s.grabConstraint);
    document.getElementById('hand').classList.add('gripping');
  } else {
    banner('REACH A WALL', 'Move next to a wall, then HAND', 800);
  }
}
function releaseGrab(s){
  if(s.grabConstraint){ World.remove(world, s.grabConstraint); s.grabConstraint=null; document.getElementById('hand').classList.remove('gripping'); }
}

// ---------- weapon damage on collision ----------
Events.on(engine, 'collisionStart', ev=>{
  if(mode!=='fight') return;
  for(const pair of ev.pairs){
    const a=pair.bodyA.label||'', b=pair.bodyB.label||'';
    // player weapon hits enemy torso/head
    if((a==='p_weapon'&&(b==='e_torso'||b==='e_head')) || (b==='p_weapon'&&(a==='e_torso'||a==='e_head'))){
      if(enemy.hitCd<=0){ const spd=weaponSpeed(player.weapon); if(spd>2.0) damage(enemy, Math.min(18, 4+spd*1.4)); hitSpark(enemy.torso.position); }
    }
    if((a==='e_weapon'&&(b==='p_torso'||b==='p_head')) || (b==='e_weapon'&&(a==='p_torso'||a==='p_head'))){
      if(player.hitCd<=0){ const spd=weaponSpeed(enemy.weapon); if(spd>1.5) damage(player, Math.min(14, 3+spd*1.1)); hitSpark(player.torso.position); }
    }
  }
});
function weaponSpeed(w){ return Math.hypot(w.velocity.x, w.velocity.y); }

// ---------- hit spark ----------
const sparks=[];
function hitSpark(pos){ sparks.push({ x:pos.x, y:pos.y, life:0.25 }); }

// ---------- main update ----------
Events.on(engine, 'beforeUpdate', ()=>{
  const dt = 1/60;
  if(bannerTimer>0){ bannerTimer-=dt; if(bannerTimer<0.6) bannerEl.style.opacity=Math.max(0,bannerTimer/0.6); if(bannerTimer<=0) bannerEl.classList.add('hidden'); }
  if(mode!=='fight'||!player||!enemy) return;

  if(player.hitCd>0) player.hitCd-=dt;
  if(enemy.hitCd>0) enemy.hitCd-=dt;

  // ----- player control: move = attack -----
  controlStickman(player, moveInput.active ? moveInput.x : keyboardX(), moveInput.active||keyboardX()!==0);

  // ----- enemy AI -----
  aiStickman(enemy, player);

  // keep upright-ish (anti-faceplant torque)
  uprightAssist(player);
  uprightAssist(enemy);
});

function keyboardX(){ let x=0; if(keys['KeyA']||keys['ArrowLeft'])x-=1; if(keys['KeyD']||keys['ArrowRight'])x+=1; return x; }

function controlStickman(s, dirX, moving){
  // face direction
  if(dirX>0.1) s.facing=1; else if(dirX<-0.1) s.facing=-1;
  // walk: apply horizontal force on torso when grounded or gripping
  if(Math.abs(dirX)>0.1 && !s.grabConstraint){
    Body.applyForce(s.torso, s.torso.position, { x: dirX*0.0016*s.torso.mass*60, y:0 });
    // cap horizontal speed
    if(Math.abs(s.torso.velocity.x) > 6) Body.setVelocity(s.torso, { x: Math.sign(s.torso.velocity.x)*6, y: s.torso.velocity.y });
  }
  // swing weapon when moving (this IS the attack)
  if(moving){
    s.swingPhase += 0.5;
    const torque = Math.sin(s.swingPhase) * 0.9 * s.facing;
    Body.setAngularVelocity(s.weapon, torque*6);
    // nudge weapon toward target side
    Body.applyForce(s.weapon, s.weapon.position, { x: s.facing*0.0006, y: Math.sin(s.swingPhase)*0.0008 });
  }
}

function aiStickman(s, target){
  const dx = target.torso.position.x - s.torso.position.x;
  const dist = Math.abs(dx);
  let dir = Math.sign(dx);
  // approach to a striking range, then keep swinging
  let moving = false;
  if(dist > 70){ // walk toward player
    Body.applyForce(s.torso, s.torso.position, { x: dir*0.0016*s.torso.mass*60, y:0 });
    if(Math.abs(s.torso.velocity.x) > 5) Body.setVelocity(s.torso, { x: Math.sign(s.torso.velocity.x)*5, y: s.torso.velocity.y });
    s.facing = dir; moving = true;
  } else {
    s.facing = dir; moving = true; // in range: keep swinging
  }
  if(moving){
    s.swingPhase += 0.42;
    Body.setAngularVelocity(s.weapon, Math.sin(s.swingPhase)*5.2*s.facing);
    Body.applyForce(s.weapon, s.weapon.position, { x: s.facing*0.0005, y: Math.sin(s.swingPhase)*0.0007 });
  }
}

function uprightAssist(s){
  // gentle torque to keep torso vertical so they don't just lie down
  const a = s.torso.angle;
  let target = 0;
  let diff = target - a;
  while(diff>Math.PI) diff-=2*Math.PI; while(diff<-Math.PI) diff+=2*Math.PI;
  Body.setAngularVelocity(s.torso, s.torso.angularVelocity*0.6 + diff*0.15);
}

// ---------- custom rendering overlay (faces, weapon glow, sparks) ----------
Events.on(render, 'afterRender', ()=>{
  const ctx = render.context;
  // ground line
  ctx.strokeStyle='#2a3a5c'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,groundY); ctx.lineTo(W,groundY); ctx.stroke();
  // sparks
  for(let i=sparks.length-1;i>=0;i--){
    const sp=sparks[i]; sp.life-=1/60;
    ctx.beginPath(); ctx.arc(sp.x, sp.y, 18*(0.25-sp.life)/0.25+4, 0, Math.PI*2);
    ctx.fillStyle=`rgba(255,220,120,${Math.max(0,sp.life/0.25)})`; ctx.fill();
    if(sp.life<=0) sparks.splice(i,1);
  }
});

// ---------- resize ----------
addEventListener('resize', ()=>{
  W=innerWidth; H=innerHeight;
  render.canvas.width=W; render.canvas.height=H;
  render.options.width=W; render.options.height=H;
});
</script>
</body>
</html>
